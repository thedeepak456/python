<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python String Methods — Assignment</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e10;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: #2a2a35;
    --accent: #a5f3c0;
    --accent2: #f3a5c0;
    --accent3: #a5c0f3;
    --text: #e8e8f0;
    --muted: #7a7a90;
    --mono: 'Space Mono', monospace;
    --sans: 'Syne', sans-serif;
    --correct: #a5f3c0;
    --wrong: #f3a5c0;
    --correct-bg: rgba(165,243,192,0.08);
    --wrong-bg: rgba(243,165,192,0.08);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid BG */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(165,243,192,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(165,243,192,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .page { position: relative; z-index: 1; max-width: 820px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }

  /* Header */
  header { margin-bottom: 3rem; }
  .tag { display: inline-block; font-family: var(--mono); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent); border: 1px solid var(--accent); padding: 4px 10px; border-radius: 2px; margin-bottom: 1rem; }
  h1 { font-size: clamp(2rem, 5vw, 3.2rem); font-weight: 800; line-height: 1.05; letter-spacing: -0.02em; margin-bottom: 0.6rem; }
  h1 span { color: var(--accent); }
  .subtitle { font-family: var(--mono); font-size: 13px; color: var(--muted); margin-bottom: 1.8rem; }

  /* Score bar */
  .score-row { display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap; }
  .score-box { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 0.6rem 1.2rem; display: flex; align-items: center; gap: 10px; }
  .score-num { font-size: 1.6rem; font-weight: 800; font-family: var(--mono); color: var(--accent); min-width: 2ch; }
  .score-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
  .progress-wrap { flex: 1; min-width: 160px; }
  .progress-track { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.5s cubic-bezier(.4,0,.2,1); width: 0%; }
  .reset-btn { font-family: var(--mono); font-size: 11px; color: var(--muted); background: none; border: 1px solid var(--border); border-radius: 4px; padding: 6px 12px; cursor: pointer; transition: all 0.2s; margin-left: auto; }
  .reset-btn:hover { color: var(--accent2); border-color: var(--accent2); }

  /* Section divider */
  .divider { display: flex; align-items: center; gap: 12px; margin: 2.5rem 0 1.2rem; }
  .divider-line { flex: 1; height: 1px; background: var(--border); }
  .divider-label { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; white-space: nowrap; }

  /* Cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.4rem 1.5rem;
    margin-bottom: 1rem;
    position: relative;
    transition: border-color 0.3s, box-shadow 0.3s;
    animation: slideIn 0.4s ease both;
  }
  .card:nth-child(1) { animation-delay: 0.05s; }
  .card:nth-child(2) { animation-delay: 0.1s; }
  .card:nth-child(3) { animation-delay: 0.15s; }
  .card:nth-child(4) { animation-delay: 0.2s; }
  .card:nth-child(5) { animation-delay: 0.25s; }
  .card:nth-child(6) { animation-delay: 0.3s; }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card.solved { border-color: rgba(165,243,192,0.35); background: linear-gradient(135deg, var(--surface), rgba(165,243,192,0.04)); }
  .card.wrong-shake { animation: shake 0.35s ease; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }

  .card-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.8rem; }
  .q-num { font-family: var(--mono); font-size: 10px; color: var(--accent3); letter-spacing: 0.1em; }
  .q-topic { font-family: var(--mono); font-size: 10px; color: var(--muted); padding: 2px 8px; border: 1px solid var(--border); border-radius: 20px; }
  .solved-mark { font-size: 12px; color: var(--correct); font-family: var(--mono); display: none; }
  .card.solved .solved-mark { display: inline; }

  .q-task { font-size: 15px; line-height: 1.6; margin-bottom: 0.8rem; font-weight: 400; }
  code { font-family: var(--mono); font-size: 12px; background: rgba(165,195,243,0.1); color: var(--accent3); padding: 2px 6px; border-radius: 3px; }

  .hint-row { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-bottom: 0.9rem; padding-left: 1px; }

  .input-row { display: flex; gap: 8px; }
  .ans-input {
    flex: 1;
    font-family: var(--mono);
    font-size: 13px;
    padding: 9px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .ans-input:focus { border-color: var(--accent3); box-shadow: 0 0 0 3px rgba(165,195,243,0.12); }
  .ans-input:disabled { opacity: 0.5; cursor: not-allowed; }

  .check-btn {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    padding: 9px 16px;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    border-radius: 6px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }
  .check-btn:hover { background: var(--accent); color: #0e0e10; }
  .check-btn:active { transform: scale(0.96); }
  .check-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .hint-btn {
    font-family: var(--mono);
    font-size: 12px;
    padding: 9px 14px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 6px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
  }
  .hint-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  .feedback {
    margin-top: 10px;
    font-size: 12px;
    font-family: var(--mono);
    padding: 8px 12px;
    border-radius: 6px;
    display: none;
    line-height: 1.5;
  }
  .feedback.ok { display: block; background: var(--correct-bg); color: var(--correct); border: 1px solid rgba(165,243,192,0.2); }
  .feedback.err { display: block; background: var(--wrong-bg); color: var(--wrong); border: 1px solid rgba(243,165,192,0.2); }
  .feedback.tip { display: block; background: rgba(165,195,243,0.06); color: var(--accent3); border: 1px solid rgba(165,195,243,0.15); }

  /* Cheat sheet */
  .sheet { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-top: 2.5rem; }
  .sheet h2 { font-size: 14px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 1.2rem; font-family: var(--mono); }
  .method-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; }
  .method-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 0.7rem 0.9rem; }
  .method-name { font-family: var(--mono); font-size: 12px; color: var(--accent3); margin-bottom: 3px; }
  .method-desc { font-size: 11px; color: var(--muted); line-height: 1.4; }

  /* Completion banner */
  .complete-banner {
    display: none;
    margin-top: 2rem;
    background: var(--correct-bg);
    border: 1px solid rgba(165,243,192,0.3);
    border-radius: 12px;
    padding: 1.5rem;
    text-align: center;
    animation: fadeIn 0.6s ease;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)} }
  .complete-banner.show { display: block; }
  .complete-banner h3 { font-size: 1.4rem; font-weight: 800; color: var(--accent); margin-bottom: 0.3rem; }
  .complete-banner p { font-family: var(--mono); font-size: 12px; color: var(--muted); }

  @media (max-width: 540px) {
    .input-row { flex-wrap: wrap; }
    .ans-input { width: 100%; }
  }
</style>
</head>
<body>
<div class="page">

  <header>
    <div class="tag">Python · String Methods</div>
    <h1>Practical <span>Assignment</span></h1>
    <p class="subtitle">// 6 exercises · test your understanding</p>
    <div class="score-row">
      <div class="score-box">
        <span class="score-num" id="score">0</span>
        <div>
          <div class="score-label">Correct</div>
          <div style="font-size:11px;color:var(--muted);font-family:var(--mono)">out of 6</div>
        </div>
      </div>
      <div class="progress-wrap">
        <div style="font-size:11px;color:var(--muted);font-family:var(--mono);margin-bottom:6px;letter-spacing:0.08em">PROGRESS</div>
        <div class="progress-track"><div class="progress-fill" id="prog"></div></div>
      </div>
      <button class="reset-btn" onclick="resetAll()">↺ Reset</button>
    </div>
  </header>

  <div class="divider"><div class="divider-line"></div><div class="divider-label">Exercises</div><div class="divider-line"></div></div>

  <div id="exercise-container"></div>

  <div class="complete-banner" id="complete">
    <h3>🎉 Assignment Complete!</h3>
    <p>All 6 exercises solved · Well done!</p>
  </div>

  <div class="divider"><div class="divider-line"></div><div class="divider-label">Quick Reference</div><div class="divider-line"></div></div>

  <div class="sheet">
    <h2>String Methods Cheat Sheet</h2>
    <div class="method-grid" id="cheat"></div>
  </div>

</div>

<script>
const exercises = [
  {
    topic: "Case Conversion",
    task: 'What does <code>"Python Programming".lower()</code> return?',
    hint: '// Type the exact string output',
    check: v => v.trim().replace(/^["']|["']$/g,'') === 'python programming',
    answer: '"python programming"',
    explain: '✓ lower() converts every character to lowercase.'
  },
  {
    topic: "Checking Method",
    task: 'What does <code>"Hello123".isalpha()</code> return?',
    hint: '// Hint: isalpha() → True only if ALL chars are letters',
    check: v => v.trim() === 'False',
    answer: 'False',
    explain: '✓ Contains digits → isalpha() returns False.'
  },
  {
    topic: "Title Case",
    task: 'What is the output of <code>"welcome to python".title()</code>?',
    hint: '// title() capitalizes the first letter of each word',
    check: v => v.trim().replace(/^["']|["']$/g,'') === 'Welcome To Python',
    answer: '"Welcome To Python"',
    explain: '✓ title() capitalizes the first letter of each word.'
  },
  {
    topic: "Replace & Count",
    task: 'What does <code>"banana".count("a")</code> return?',
    hint: '// count() tallies how many times the substring appears',
    check: v => v.trim() === '3',
    answer: '3',
    explain: '✓ "banana" has 3 occurrences of "a".'
  },
  {
    topic: "Strip & Split",
    task: 'What does <code>"  hello world  ".strip().split()</code> return?',
    hint: '// strip() removes spaces first, then split() splits on whitespace',
    check: v => {
      const n = v.trim().replace(/\s/g,'').replace(/'/g,'"');
      return n === '["hello","world"]';
    },
    answer: "['hello', 'world']",
    explain: "✓ strip() removes outer spaces, split() creates ['hello','world']."
  },
  {
    topic: "Join Method",
    task: 'Complete: <code>result = "→".join(["start","middle","end"])</code><br>What is the value of <code>result</code>?',
    hint: '// join() inserts the separator between items',
    check: v => v.trim().replace(/^["']|["']$/g,'') === 'start→middle→end',
    answer: '"start→middle→end"',
    explain: '✓ join() places "→" between each item in the list.'
  }
];

const methods = [
  { name: 'upper()', desc: 'Convert to UPPERCASE' },
  { name: 'lower()', desc: 'Convert to lowercase' },
  { name: 'title()', desc: 'Capitalize Each Word' },
  { name: 'capitalize()', desc: 'Capitalize first letter only' },
  { name: 'strip()', desc: 'Remove surrounding spaces' },
  { name: 'lstrip()', desc: 'Remove left spaces' },
  { name: 'rstrip()', desc: 'Remove right spaces' },
  { name: 'find()', desc: 'Index of first match (-1 if none)' },
  { name: 'index()', desc: 'Index of first match (error if none)' },
  { name: 'replace()', desc: 'Replace occurrences of a substring' },
  { name: 'count()', desc: 'Count substring occurrences' },
  { name: 'split()', desc: 'Split string into a list' },
  { name: 'join()', desc: 'Join list into a string' },
  { name: 'isalpha()', desc: 'True if all letters' },
  { name: 'isdigit()', desc: 'True if all digits' },
  { name: 'isalnum()', desc: 'True if letters + digits' },
  { name: 'islower()', desc: 'True if all lowercase' },
  { name: 'isupper()', desc: 'True if all uppercase' },
  { name: 'format()', desc: 'Insert values into string template' },
];

let solved = new Array(exercises.length).fill(false);

function renderExercises() {
  const c = document.getElementById('exercise-container');
  c.innerHTML = '';
  exercises.forEach((q, i) => {
    const div = document.createElement('div');
    div.className = 'card' + (solved[i] ? ' solved' : '');
    div.id = 'card-' + i;
    div.innerHTML = `
      <div class="card-meta">
        <span class="q-num">Q${String(i+1).padStart(2,'0')}</span>
        <span class="q-topic">${q.topic}</span>
        <span class="solved-mark">✓ solved</span>
      </div>
      <div class="q-task">${q.task}</div>
      <div class="hint-row">${q.hint}</div>
      <div class="input-row">
        <input class="ans-input" id="inp-${i}" type="text" placeholder="Your answer..."
          ${solved[i] ? 'disabled' : ''}
          onkeydown="if(event.key==='Enter') checkAnswer(${i})">
        <button class="check-btn" onclick="checkAnswer(${i})" ${solved[i] ? 'disabled' : ''}>Run →</button>
        ${solved[i] ? '' : `<button class="hint-btn" onclick="showHint(${i})">?</button>`}
      </div>
      <div class="feedback" id="fb-${i}"></div>
    `;
    c.appendChild(div);
    if (solved[i]) {
      const fb = div.querySelector('#fb-' + i);
      fb.className = 'feedback ok';
      fb.textContent = q.explain;
    }
  });
}

function renderCheat() {
  const c = document.getElementById('cheat');
  c.innerHTML = methods.map(m => `
    <div class="method-item">
      <div class="method-name">${m.name}</div>
      <div class="method-desc">${m.desc}</div>
    </div>
  `).join('');
}

function checkAnswer(i) {
  const inp = document.getElementById('inp-' + i);
  const fb = document.getElementById('fb-' + i);
  const val = inp.value;
  if (!val.trim()) return;
  if (exercises[i].check(val)) {
    solved[i] = true;
    updateScore();
    renderExercises();
    if (solved.every(Boolean)) {
      document.getElementById('complete').classList.add('show');
    }
  } else {
    const card = document.getElementById('card-' + i);
    card.classList.remove('wrong-shake');
    void card.offsetWidth;
    card.classList.add('wrong-shake');
    fb.className = 'feedback err';
    fb.textContent = '✗ Not quite — check the exact output format and try again.';
  }
}

function showHint(i) {
  const fb = document.getElementById('fb-' + i);
  fb.className = 'feedback tip';
  fb.textContent = '→ Expected: ' + exercises[i].answer;
}

function updateScore() {
  const n = solved.filter(Boolean).length;
  document.getElementById('score').textContent = n;
  document.getElementById('prog').style.width = (n / exercises.length * 100) + '%';
}

function resetAll() {
  solved = new Array(exercises.length).fill(false);
  document.getElementById('complete').classList.remove('show');
  updateScore();
  renderExercises();
}

renderExercises();
renderCheat();
</script>
</body>
</html>
